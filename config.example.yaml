serve:
  listen: "127.0.0.1:1080"
  admin_listen: "127.0.0.1:19090"
  # admin_token: "change-me"
  ca_dir: "~/.gomitm/ca"
  dial_timeout: "10s"
  script_timeout: "200ms"
  max_conns: 4096
  # socks_username: "change-me"
  # socks_password: "change-me"

mitm:
  all: false
  fail_open: false
  hosts:
    - "*.googlevideo.com"
    - "youtubei.googleapis.com"
  bypass_hosts:
    - "api.apple-cloudkit.com"

modules:
  - name: GoogleHomeFunDemo
    enable: true
    path: "./modules/google-home-fun.sgmodule"
    arguments:
      文案: "今天也要快乐摸鱼"
  - name: YouTubeNoAds
    enable: false
    path: "https://raw.githubusercontent.com/iab0x00/ProxyRules/refs/heads/main/Rewrite/YouTubeNoAd.sgmodule"
    arguments:
      字幕翻译语言: "off"
      歌词翻译语言: "off"
      启用调试模式: false
  - name: YouTubeWebLite
    enable: false
    path: "./modules/youtube-web-lite.sgmodule"
    arguments:
      启用页面样式清理: true

capture:
  enabled: false
  max_entries: 1000
  max_body_bytes: 2097152
  content_types:
    - "application/json"
    - "text/*"
  redact_headers:
    - "Authorization"
    - "Proxy-Authorization"
    - "Cookie"
    - "Set-Cookie"
  redact_json_fields:
    - "password"
    - "passwd"
    - "pwd"
    - "token"
    - "access_token"
    - "refresh_token"
    - "secret"
    - "api_key"
    - "apikey"
    - "session"
  har_out: "./tmp/session.har"
