name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag name for manual release (e.g. v0.1.3)"
        required: false
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      TOKEN: ${{ secrets.TOKEN }}
      SERVER_URL: ${{ gitea.server_url }}
      REPO: ${{ gitea.repository }}
      REF: ${{ gitea.ref }}
      RELEASE_TAG_INPUT: ${{ inputs.release_tag }}
      SHA: ${{ gitea.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build release binaries
        run: |
          set -euo pipefail

          VERSION=""
          if [[ "$REF" == refs/tags/* ]]; then
            VERSION="${REF#refs/tags/}"
          elif [ -n "${RELEASE_TAG_INPUT:-}" ]; then
            VERSION="${RELEASE_TAG_INPUT}"
          fi
          if [ -z "$VERSION" ]; then
            echo "invalid release version: ref=$REF, release_tag input is empty"
            echo "for workflow_dispatch on branch refs/heads/*, provide input release_tag (e.g. v0.1.3)"
            exit 1
          fi

          mkdir -p dist

          targets=(
            "linux amd64"
            "linux arm64"
            "darwin amd64"
            "darwin arm64"
            "windows amd64"
            "windows arm64"
          )

          for t in "${targets[@]}"; do
            GOOS="$(echo "$t" | awk '{print $1}')"
            GOARCH="$(echo "$t" | awk '{print $2}')"
            BIN="gomitm"
            EXT=""
            if [ "$GOOS" = "windows" ]; then
              EXT=".exe"
            fi

            OUTDIR="dist/gomitm_${VERSION}_${GOOS}_${GOARCH}"
            mkdir -p "$OUTDIR"

            CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" \
              go build -trimpath -ldflags "-s -w" \
              -o "$OUTDIR/${BIN}${EXT}" ./cmd/gomitm

            # bundle default runtime config + local demo modules
            cp config.example.yaml "$OUTDIR/config.yaml"
            cp -R modules "$OUTDIR/"

            if [ "$GOOS" = "windows" ]; then
              ASSET="gomitm_${VERSION}_${GOOS}_${GOARCH}.zip"
              (cd dist && zip -rq "$ASSET" "gomitm_${VERSION}_${GOOS}_${GOARCH}")
              ZIP_LIST="$(unzip -Z1 "dist/$ASSET")"
              grep -qE "/config\\.yaml$" <<<"$ZIP_LIST"
              grep -qE "/modules/google-home-fun\\.sgmodule$" <<<"$ZIP_LIST"
            else
              ASSET="gomitm_${VERSION}_${GOOS}_${GOARCH}.tar.gz"
              (cd dist && tar -czf "$ASSET" "gomitm_${VERSION}_${GOOS}_${GOARCH}")
              TAR_LIST="$(tar -tzf "dist/$ASSET")"
              grep -qE "/config\\.yaml$" <<<"$TAR_LIST"
              grep -qE "/modules/google-home-fun\\.sgmodule$" <<<"$TAR_LIST"
            fi

            rm -rf "$OUTDIR"
          done

          (cd dist && shasum -a 256 gomitm_${VERSION}_* > checksums.txt)

      - name: Create or get release
        run: |
          set -euo pipefail

          if [ -z "${TOKEN:-}" ]; then
            echo "secrets.TOKEN is required for release publishing"
            exit 1
          fi

          VERSION=""
          if [[ "$REF" == refs/tags/* ]]; then
            VERSION="${REF#refs/tags/}"
          elif [ -n "${RELEASE_TAG_INPUT:-}" ]; then
            VERSION="${RELEASE_TAG_INPUT}"
          fi
          if [ -z "$VERSION" ]; then
            echo "invalid release version: ref=$REF, release_tag input is empty"
            exit 1
          fi
          API_URL="${SERVER_URL%/}/api/v1"

          set +e
          RELEASE_JSON=$(curl -fsS \
            -H "Authorization: token ${TOKEN}" \
            "${API_URL}/repos/${REPO}/releases/tags/${VERSION}")
          GET_EXIT=$?
          set -e

          if [ $GET_EXIT -ne 0 ] || [ -z "${RELEASE_JSON}" ]; then
            CREATE_PAYLOAD=$(jq -n \
              --arg version "${VERSION}" \
              '{
                tag_name: $version,
                name: $version,
                body: ("Automated release for " + $version),
                target_commitish: $sha,
                draft: false,
                prerelease: false
              }')

            RELEASE_JSON=$(curl -fsS -X POST \
              -H "Authorization: token ${TOKEN}" \
              -H "Content-Type: application/json" \
              "${API_URL}/repos/${REPO}/releases" \
              -d "${CREATE_PAYLOAD}")
          fi

          RELEASE_ID=$(echo "${RELEASE_JSON}" | jq -r '.id')
          if [ -z "${RELEASE_ID}" ] || [ "${RELEASE_ID}" = "null" ]; then
            echo "failed to get release id"
            echo "${RELEASE_JSON}"
            exit 1
          fi

          echo "RELEASE_ID=${RELEASE_ID}" >> "$GITEA_ENV"
          echo "API_URL=${API_URL}" >> "$GITEA_ENV"

      - name: Upload release assets
        run: |
          set -euo pipefail

          for f in dist/*; do
            name="$(basename "$f")"
            echo "Uploading ${name}"
            curl -fsS -X POST \
              -H "Authorization: token ${TOKEN}" \
              -H "Content-Type: application/octet-stream" \
              "${API_URL}/repos/${REPO}/releases/${RELEASE_ID}/assets?name=${name}" \
              --data-binary "@${f}"
          done
