name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run unit tests
        run: go test ./...

      - name: Run race tests
        run: go test -race ./...

      - name: Run vet
        run: go vet ./...

      - name: Coverage gate
        run: |
          set -euo pipefail
          go test -coverprofile=coverage.out ./...
          TOTAL="$(go tool cover -func=coverage.out | awk '/^total:/{gsub("%","",$3); print $3}')"
          echo "total coverage: ${TOTAL}%"
          awk -v total="$TOTAL" 'BEGIN { if (total + 0 < 55.0) { exit 1 } }'

  build-smoke:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: |
          mkdir -p dist
          go build -trimpath -o dist/gomitm ./cmd/gomitm
