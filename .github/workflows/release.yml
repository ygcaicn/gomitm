name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag name for manual release (e.g. v0.1.3)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      TOKEN: ${{ secrets.GITHUB_TOKEN }}
      API_URL: ${{ github.api_url }}
      REPO: ${{ github.repository }}
      REF: ${{ github.ref }}
      RELEASE_TAG_INPUT: ${{ inputs.release_tag }}
      SHA: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve release version
        run: |
          set -euo pipefail

          VERSION=""
          if [[ "$REF" == refs/tags/* ]]; then
            VERSION="${REF#refs/tags/}"
          elif [ -n "${RELEASE_TAG_INPUT:-}" ]; then
            VERSION="${RELEASE_TAG_INPUT}"
          fi

          if [ -z "$VERSION" ]; then
            echo "invalid release version: ref=$REF, release_tag input is empty"
            echo "for workflow_dispatch on branch refs/heads/*, provide input release_tag (e.g. v0.1.3)"
            exit 1
          fi

          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Run tests
        run: go test ./...

      - name: Build release binaries
        run: |
          set -euo pipefail

          mkdir -p dist
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="-s -w -X main.version=${VERSION} -X main.commit=${SHA} -X main.buildDate=${BUILD_DATE}"

          targets=(
            "linux amd64"
            "linux arm64"
            "darwin amd64"
            "darwin arm64"
            "windows amd64"
            "windows arm64"
          )

          for t in "${targets[@]}"; do
            GOOS="$(echo "$t" | awk '{print $1}')"
            GOARCH="$(echo "$t" | awk '{print $2}')"
            BIN="gomitm"
            EXT=""
            if [ "$GOOS" = "windows" ]; then
              EXT=".exe"
            fi

            OUTDIR="dist/gomitm_${VERSION}_${GOOS}_${GOARCH}"
            mkdir -p "$OUTDIR"

            CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" \
              go build -trimpath -ldflags "$LDFLAGS" \
              -o "$OUTDIR/${BIN}${EXT}" ./cmd/gomitm

            cp config.example.yaml "$OUTDIR/config.yaml"
            cp -R modules "$OUTDIR/"

            if [ "$GOOS" = "windows" ]; then
              ASSET="gomitm_${VERSION}_${GOOS}_${GOARCH}.zip"
              (cd dist && zip -rq "$ASSET" "gomitm_${VERSION}_${GOOS}_${GOARCH}")
              ZIP_LIST="$(unzip -Z1 "dist/$ASSET")"
              grep -qE "/config\\.yaml$" <<<"$ZIP_LIST"
              grep -qE "/modules/google-home-fun\\.sgmodule$" <<<"$ZIP_LIST"
            else
              ASSET="gomitm_${VERSION}_${GOOS}_${GOARCH}.tar.gz"
              (cd dist && tar -czf "$ASSET" "gomitm_${VERSION}_${GOOS}_${GOARCH}")
              TAR_LIST="$(tar -tzf "dist/$ASSET")"
              grep -qE "/config\\.yaml$" <<<"$TAR_LIST"
              grep -qE "/modules/google-home-fun\\.sgmodule$" <<<"$TAR_LIST"
            fi

            rm -rf "$OUTDIR"
          done

          (cd dist && shasum -a 256 gomitm_${VERSION}_* > checksums.txt)

      - name: Create or get release
        run: |
          set -euo pipefail

          TMP_RELEASE_JSON="$(mktemp)"
          HTTP_CODE="$(curl -sS \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -o "${TMP_RELEASE_JSON}" \
            -w "%{http_code}" \
            "${API_URL}/repos/${REPO}/releases/tags/${VERSION}")"

          if [ "${HTTP_CODE}" = "200" ]; then
            RELEASE_JSON="$(cat "${TMP_RELEASE_JSON}")"
          else
            echo "release tag not found yet (status=${HTTP_CODE}), creating new release for ${VERSION}"
            CREATE_PAYLOAD=$(jq -n \
              --arg version "${VERSION}" \
              --arg sha "${SHA}" \
              '{
                tag_name: $version,
                name: $version,
                body: ("Automated release for " + $version),
                target_commitish: $sha,
                draft: false,
                prerelease: false
              }')

            RELEASE_JSON=$(curl -fsS -X POST \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/json" \
              "${API_URL}/repos/${REPO}/releases" \
              -d "${CREATE_PAYLOAD}")
          fi
          rm -f "${TMP_RELEASE_JSON}"

          RELEASE_ID=$(echo "${RELEASE_JSON}" | jq -r '.id')
          if [ -z "${RELEASE_ID}" ] || [ "${RELEASE_ID}" = "null" ]; then
            echo "failed to get release id"
            echo "${RELEASE_JSON}"
            exit 1
          fi

          echo "RELEASE_ID=${RELEASE_ID}" >> "$GITHUB_ENV"

      - name: Upload release assets
        run: |
          set -euo pipefail

          EXISTING_ASSETS_JSON="$(curl -fsS \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${API_URL}/repos/${REPO}/releases/${RELEASE_ID}/assets")"

          for f in dist/*; do
            name="$(basename "$f")"
            existing_id="$(echo "${EXISTING_ASSETS_JSON}" | jq -r --arg name "$name" '.[] | select(.name == $name) | .id')"
            if [ -n "${existing_id}" ] && [ "${existing_id}" != "null" ]; then
              echo "Deleting existing asset ${name} (${existing_id})"
              curl -fsS -X DELETE \
                -H "Authorization: Bearer ${TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "${API_URL}/repos/${REPO}/releases/assets/${existing_id}" >/dev/null
            fi

            echo "Uploading ${name}"
            curl -fsS -X POST \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/octet-stream" \
              "https://uploads.github.com/repos/${REPO}/releases/${RELEASE_ID}/assets?name=${name}" \
              --data-binary "@${f}" >/dev/null
          done
